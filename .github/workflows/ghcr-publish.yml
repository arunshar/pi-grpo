name: Publish images to GHCR

# Publishes container images to the GitHub Container Registry (ghcr.io).
#
# - cpu-repro: built, RUN as a determinism gate (the tests must pass), then
#   pushed on every relevant push to main. This is the reliable, CPU-only
#   reproducibility image (docker/Dockerfile.cpu).
# - gpu-serving: the heavy CUDA + vLLM + DeepSpeed serving image (app/Dockerfile).
#   Manual-only (workflow_dispatch with publish_gpu=true) because it is large and
#   cannot be GPU-tested on a CPU runner; gating it keeps the workflow green.
#
# Auth uses the built-in GITHUB_TOKEN with packages:write, so no personal access
# token is required.

on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.cpu"
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "evaluation/**"
      - "configs/**"
      - "pyproject.toml"
      - ".dockerignore"
      - ".github/workflows/ghcr-publish.yml"
  workflow_dispatch:
    inputs:
      publish_gpu:
        description: "Also build and push the GPU serving image (large, no GPU test)"
        type: boolean
        default: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  cpu-repro:
    name: Build, test, and push CPU reproducibility image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CPU image and load locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.cpu
          load: true
          push: false
          tags: ${{ env.IMAGE }}:cpu

      - name: Determinism gate (tests must pass inside the container)
        run: docker run --rm ${{ env.IMAGE }}:cpu

      - name: Push CPU image tags
        run: |
          docker tag ${{ env.IMAGE }}:cpu ${{ env.IMAGE }}:cpu-${{ github.sha }}
          docker push ${{ env.IMAGE }}:cpu
          docker push ${{ env.IMAGE }}:cpu-${{ github.sha }}

      - name: Summary
        run: |
          echo "Published ${{ env.IMAGE }}:cpu and :cpu-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with: docker pull ${{ env.IMAGE }}:cpu" >> "$GITHUB_STEP_SUMMARY"

  gpu-serving:
    name: Build and push GPU serving image (manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_gpu }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free up runner disk (CUDA + ML stack is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost || true
          docker image prune -af || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GPU image (no GPU test on a CPU runner)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:gpu
            ${{ env.IMAGE }}:gpu-${{ github.sha }}
