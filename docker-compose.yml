services:
  api:
    build: { context: ., dockerfile: app/Dockerfile }
    ports: ["8002:8000"]
    env_file: [.env]
    depends_on: [postgres, redis]
    deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }

  vllm:
    image: vllm/vllm-openai:v0.5.3
    command:
      - "--model=Qwen/Qwen2-7B-Instruct"
      - "--tensor-parallel-size=1"
      - "--max-model-len=8192"
      - "--enable-prefix-caching"
    ports: ["8003:8000"]
    deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pigrpo
      POSTGRES_PASSWORD: pigrpo
      POSTGRES_DB: pigrpo
    volumes: ["pg:/var/lib/postgresql/data"]
    ports: ["5433:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    command: ["--config=/etc/otel/config.yaml"]
    volumes: ["./observability/otel-config.yaml:/etc/otel/config.yaml:ro"]
    ports: ["4327:4317", "4328:4318"]

volumes: { pg: {} }
